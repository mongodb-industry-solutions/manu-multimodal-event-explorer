---
kind: pipeline
type: kubernetes
name: staging

trigger:
  branch:
    - staging

steps:
  - name: publish-backend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/manu-multimodal-event-explorer-backend
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      dockerfile: Dockerfile.backend
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  - name: publish-frontend
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/manu-multimodal-event-explorer-frontend
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}
        - latest
      dockerfile: Dockerfile.frontend
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  - name: deploy-staging
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.30.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: manu-multimodal-event-explorer
      values:
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/manu-multimodal-event-explorer-frontend"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=manu-multimodal-event-explorer.industrysolutions.staging.corp.mongodb.com"
        - "mesh.enabled=true"
        # Disable nginx buffering for SSE streaming (HITL approval flow)
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-buffering=off"
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-read-timeout=\"300\""
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-send-timeout=\"300\""
        # Combined resources for multi-container pod
        - "resources.limits.cpu=1000m"
        - "resources.limits.memory=1Gi"
        - "resources.requests.cpu=200m"
        - "resources.requests.memory=512Mi"
      api_server: https://api.staging.corp.mongodb.com
      kubernetes_token:
        from_secret: staging_kubernetes_token
      values_files: [ "environment/staging.yaml" ]
    when:
      event:
        - push

---
kind: pipeline
type: kubernetes
name: production

trigger:
  branch:
    - main

steps:
  - name: publish-backend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/manu-multimodal-event-explorer-backend-prod
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}-prod
        - prod-latest
      dockerfile: Dockerfile.backend
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  - name: publish-frontend-prod
    image: plugins/kaniko-ecr
    settings:
      create_repository: true
      registry: 795250896452.dkr.ecr.us-east-1.amazonaws.com
      repo: industrysolutions/manu-multimodal-event-explorer-frontend-prod
      tags:
        - git-${DRONE_COMMIT_SHA:0:7}-prod
        - prod-latest
      dockerfile: Dockerfile.frontend
      access_key:
        from_secret: ecr_access_key
      secret_key:
        from_secret: ecr_secret_key
    when:
      event:
        - push

  - name: deploy-production
    image: public.ecr.aws/kanopy/drone-helm:v3
    settings:
      chart: mongodb/web-app
      chart_version: 4.30.0
      add_repos: [mongodb=https://10gen.github.io/helm-charts]
      namespace: industrysolutions
      release: manu-multimodal-event-explorer-prod
      values:
        - "image.tag=git-${DRONE_COMMIT_SHA:0:7}-prod"
        - "image.repository=795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/manu-multimodal-event-explorer-frontend-prod"
        - "ingress.enabled=true"
        - "ingress.hosts[0]=manu-multimodal-event-explorer.industrysolutions.prod.corp.mongodb.com"
        - "mesh.enabled=true"
        # Disable nginx buffering for SSE streaming (HITL approval flow)
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-buffering=off"
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-read-timeout=\"300\""
        - "ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-send-timeout=\"300\""
        # Combined resources for multi-container pod (production)
        - "resources.limits.cpu=1000m"
        - "resources.limits.memory=1Gi"
        - "resources.requests.cpu=300m"
        - "resources.requests.memory=512Mi"
      api_server: https://api.prod.corp.mongodb.com
      kubernetes_token:
        from_secret: prod_kubernetes_token
      values_files: [ "environment/production.yaml" ]
    when:
      event:
        - push
