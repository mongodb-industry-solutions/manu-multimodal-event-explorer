env:
  NODE_ENV: production
  # AWS region for IRSA (no credentials needed)
  AWS_REGION: us-east-1
  # Backend API URL for frontend to connect to backend (multi-container localhost)
  BACKEND_URL: http://localhost:8000
  # Next.js public API URL - empty string forces relative URLs for browser-side fetches
  # In multi-container deployment, frontend proxies /api/* to backend on localhost:8000
  NEXT_PUBLIC_API_URL: ""
  # Database collection name
  COLLECTION_NAME: events
  # CORS origins (single URL for multi-container deployment)
  ORIGINS: "https://manu-multimodal-event-explorer.industrysolutions.prod.corp.mongodb.com"
  # App name for MongoDB connection tracking
  APP_NAME: multimodal-event-explorer
  # S3 configuration for image storage (shared with staging)
  S3_BUCKET_NAME: manu-multimodal-event-explorer-images-staging
  S3_REGION: us-east-1
  USE_S3_STORAGE: "true"
  CLOUDFRONT_DOMAIN: d15isiqwg45u7d.cloudfront.net

## Single Pod Containers (not used in multi-container mode)
# envSecrets:
#   # MongoDB Configuration
#   MONGODB_URI: manu-multimodal-secrets-prod
#   DATABASE_NAME: manu-multimodal-secrets-prod
#   VOYAGE_API_KEY: manu-multimodal-secrets-prod
#   # Bedrock Inference Profiles (see cloud-cost-tracking.md)
#   CHATCOMPLETIONS_MODEL_ID: manu-multimodal-secrets-prod
#   EMBEDDINGS_MODEL_ID: manu-multimodal-secrets-prod
  
## Multi-container pod with backend as sidecar
sidecarContainers:
  - name: backend
    image: 795250896452.dkr.ecr.us-east-1.amazonaws.com/industrysolutions/manu-multimodal-event-explorer-backend-prod:prod-latest
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 150m
        memory: 256Mi
    env:
      # MongoDB connection (from Kubernetes secret)
      - name: MONGODB_URI
        valueFrom:
          secretKeyRef:
            name: manu-multimodal-secrets-prod
            key: MONGODB_URI

      - name: DATABASE_NAME
        valueFrom:
          secretKeyRef:
            name: manu-multimodal-secrets-prod
            key: DATABASE_NAME

      # Voyage AI API Key (embeddings)
      - name: VOYAGE_API_KEY
        valueFrom:
          secretKeyRef:
            name: manu-multimodal-secrets-prod
            key: VOYAGE_API_KEY

      # AWS Bedrock model IDs
      - name: CHATCOMPLETIONS_MODEL_ID
        valueFrom:
          secretKeyRef:
            name: manu-multimodal-secrets-prod
            key: CHATCOMPLETIONS_MODEL_ID

      - name: EMBEDDINGS_MODEL_ID
        valueFrom:
          secretKeyRef:
            name: manu-multimodal-secrets-prod
            key: EMBEDDINGS_MODEL_ID

      # AWS Region for Bedrock
      - name: AWS_REGION
        value: "us-east-1"

      # Collection name
      - name: COLLECTION_NAME
        value: "events"

      # App name
      - name: APP_NAME
        value: "multimodal-event-explorer"

      # CORS origins for backend
      - name: ORIGINS
        value: "https://manu-multimodal-event-explorer.industrysolutions.prod.corp.mongodb.com"

      # S3 configuration for image storage (shared with staging)
      - name: S3_BUCKET_NAME
        value: "manu-multimodal-event-explorer-images-staging"
      
      - name: S3_REGION
        value: "us-east-1"
      
      - name: USE_S3_STORAGE
        value: "true"
      
      - name: CLOUDFRONT_DOMAIN
        value: "d15isiqwg45u7d.cloudfront.net"

