env:
  NODE_ENV: prod
  # AWS region for IRSA (no credentials needed)
  AWS_REGION: us-east-1
  # Backend API URL for frontend to connect to backend (separate pods deployment)
  BACKEND_URL: http://manu-multimodal-event-explorer-backend-prod-web-app:80
  # Database collection name
  COLLECTION_NAME: events
  # CORS origins (restrict to known production domains)
  ORIGINS: "https://manu-multimodal-event-explorer-frontend.industrysolutions.prod.corp.mongodb.com,https://manu-multimodal-event-explorer-backend.industrysolutions.prod.corp.mongodb.com"
  # App name for MongoDB connection tracking
  APP_NAME: multimodal-event-explorer

## Single Pod Containers
envSecrets:
  # MongoDB Configuration
  MONGODB_URI: manu-multimodal-secrets-prod
  DATABASE_NAME: manu-multimodal-secrets-prod
  VOYAGE_API_KEY: manu-multimodal-secrets-prod
  # Bedrock Inference Profiles (see cloud-cost-tracking.md)
  CHATCOMPLETIONS_MODEL_ID: manu-multimodal-secrets-prod
  EMBEDDINGS_MODEL_ID: manu-multimodal-secrets-prod
  
