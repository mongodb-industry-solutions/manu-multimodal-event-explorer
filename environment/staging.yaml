env:
  NODE_ENV: staging
  # AWS region for IRSA (no credentials needed)
  AWS_REGION: us-east-1
  # Backend API URL for frontend to connect to backend (separate pods deployment)
  BACKEND_URL: http://manu-multimodal-event-explorer-backend-web-app:80
  # Database collection name
  COLLECTION_NAME: events
  # CORS origins (restrict to known staging domains)
  ORIGINS: "https://manu-multimodal-event-explorer-frontend.industrysolutions.staging.corp.mongodb.com,https://manu-multimodal-event-explorer-backend.industrysolutions.staging.corp.mongodb.com,http://localhost:3000"
  # App name for MongoDB connection tracking
  APP_NAME: multimodal-event-explorer

## Single Pod Containers
envSecrets:
  # MongoDB Configuration
  MONGODB_URI: manu-multimodal-secrets
  DATABASE_NAME: manu-multimodal-secrets
  VOYAGE_API_KEY: manu-multimodal-secrets
  # Bedrock Inference Profiles (see cloud-cost-tracking.md)
  CHATCOMPLETIONS_MODEL_ID: manu-multimodal-secrets
  EMBEDDINGS_MODEL_ID: manu-multimodal-secrets

